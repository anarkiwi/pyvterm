name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: ruff (lint)
        run: ruff check --output-format=github .
      - name: ruff (format)
        run: ruff format --check .
      - name: mypy
        run: mypy

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --cov=pyvterm --cov-report=term-missing
      - name: lissajous example smoke test
        run: python examples/lissajous.py --dry-run --frames 3 --fps 0
      - name: cube3d example smoke test
        run: python examples/cube3d.py --dry-run --frames 3 --fps 0
      - name: spectrum3d example smoke test
        run: python examples/spectrum3d.py --synthetic --dry-run --frames 3 --fps 0
      - name: ruttetra example smoke test
        run: python examples/ruttetra.py --synthetic --dry-run --frames 3 --fps 0

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

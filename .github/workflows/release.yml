name: Release

# Publish to PyPI when a version tag is pushed (e.g. `v0.1.0`).
# Uses PyPI Trusted Publishing (OIDC) — configure a publisher for this repo at
# https://pypi.org/manage/project/pyvterm/settings/publishing/ (no API token needed).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyvterm/
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
